name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Create .env.test from secrets
        env:
          V1: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          V2: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          V3: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          V4: ${{ secrets.RESEND_API_KEY }}
          V5: ${{ secrets.SENTRY_DSN }}
        run: |
          [ -n "$V1" ] && echo "NEXT_PUBLIC_SUPABASE_URL=$V1" >> .env.test || true
          [ -n "$V2" ] && echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$V2" >> .env.test || true
          [ -n "$V3" ] && echo "SUPABASE_SERVICE_ROLE_KEY=$V3" >> .env.test || true
          [ -n "$V4" ] && echo "RESEND_API_KEY=$V4" >> .env.test || true
          [ -n "$V5" ] && echo "SENTRY_DSN=$V5" >> .env.test || true
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
